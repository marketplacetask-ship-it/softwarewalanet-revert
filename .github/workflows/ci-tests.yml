# ================================================================
# Software Vala - CI/CD Pipeline for Automated Testing
# ================================================================

name: Software Vala Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - unit
          - e2e
          - api
          - security
          - load

env:
  NODE_VERSION: '20'
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
  TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

jobs:
  # ============= UNIT TESTS =============
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    if: github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'unit' || github.event.inputs.test_type == ''
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run unit tests
        run: npm run test:unit -- --coverage
        
      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # ============= E2E TESTS =============
  e2e-tests:
    name: E2E Tests (Cypress)
    runs-on: ubuntu-latest
    if: github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'e2e' || github.event.inputs.test_type == ''
    
    services:
      # Local Supabase for testing
      supabase:
        image: supabase/postgres:15.1.0.54
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Start application
        run: npm run dev &
        env:
          VITE_SUPABASE_URL: ${{ env.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ env.SUPABASE_ANON_KEY }}
          
      - name: Wait for app to start
        run: npx wait-on http://localhost:5173 --timeout 60000
        
      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          config-file: tests/e2e/cypress.config.ts
          record: true
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Upload test videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-videos
          path: cypress/videos
          retention-days: 7
          
      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          retention-days: 7

  # ============= API TESTS =============
  api-tests:
    name: API Tests (Newman)
    runs-on: ubuntu-latest
    if: github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'api' || github.event.inputs.test_type == ''
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra
        
      - name: Run API tests
        run: |
          newman run tests/api/postman/software-vala-api.postman_collection.json \
            --environment tests/api/postman/env.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export reports/api-test-report.html \
            --iteration-count 1 \
            --timeout-request 10000
        env:
          BASE_URL: ${{ env.SUPABASE_URL }}/functions/v1
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          
      - name: Upload API test report
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: reports/api-test-report.html
          retention-days: 30

  # ============= SECURITY TESTS =============
  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    if: github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'security' || github.event.inputs.test_type == ''
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install Playwright
        run: npx playwright install chromium
        
      - name: Run security tests
        run: npx ts-node tests/security/security-tests.ts > reports/security-report.txt
        env:
          API_URL: ${{ env.SUPABASE_URL }}/functions/v1
          APP_URL: http://localhost:5173
          TEST_TOKEN: ${{ secrets.TEST_TOKEN }}
          DEV_PASSWORD: ${{ secrets.DEV_PASSWORD }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
          FRANCHISE_PASSWORD: ${{ secrets.FRANCHISE_PASSWORD }}
          
      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: reports/security-report.txt
          retention-days: 30
          
      - name: Check for critical failures
        run: |
          if grep -q "FAIL.*CRITICAL" reports/security-report.txt; then
            echo "Critical security issues found!"
            exit 1
          fi

  # ============= LOAD TESTS =============
  load-tests:
    name: Load Tests (K6)
    runs-on: ubuntu-latest
    if: github.event.inputs.test_type == 'load' || (github.event_name == 'schedule')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install K6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
          
      - name: Run K6 load tests
        run: |
          k6 run tests/load/k6-load-test.js \
            --out json=reports/load-test-results.json \
            2>&1 | tee reports/load-test-output.txt
        env:
          API_URL: ${{ env.SUPABASE_URL }}/functions/v1
          TEST_EMAIL: ${{ env.TEST_EMAIL }}
          TEST_PASSWORD: ${{ env.TEST_PASSWORD }}
          
      - name: Upload load test results
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: reports/
          retention-days: 30

  # ============= NOTIFY ON FAILURE =============
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests, api-tests, security-tests]
    if: failure()
    
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ Software Vala Test Suite Failed!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Software Vala Test Suite Failed!*\n\nWorkflow: ${{ github.workflow }}\nBranch: ${{ github.ref }}\nCommit: ${{ github.sha }}\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
          
      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: '❌ Software Vala Test Suite Failed - ${{ github.ref }}'
          body: |
            Software Vala Test Suite Failed!
            
            Workflow: ${{ github.workflow }}
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            
            View details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: devops@softwarevala.com
          from: CI/CD <ci@softwarevala.com>

  # ============= GENERATE REPORT =============
  generate-report:
    name: Generate Test Report
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests, api-tests, security-tests]
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-reports
          
      - name: Generate consolidated report
        run: |
          mkdir -p final-report
          echo "# Software Vala Test Report" > final-report/README.md
          echo "" >> final-report/README.md
          echo "Generated: $(date)" >> final-report/README.md
          echo "" >> final-report/README.md
          echo "## Test Results Summary" >> final-report/README.md
          echo "" >> final-report/README.md
          
          # Add job statuses
          echo "| Test Suite | Status |" >> final-report/README.md
          echo "|------------|--------|" >> final-report/README.md
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> final-report/README.md
          echo "| E2E Tests | ${{ needs.e2e-tests.result }} |" >> final-report/README.md
          echo "| API Tests | ${{ needs.api-tests.result }} |" >> final-report/README.md
          echo "| Security Tests | ${{ needs.security-tests.result }} |" >> final-report/README.md
          
      - name: Upload final report
        uses: actions/upload-artifact@v4
        with:
          name: consolidated-test-report
          path: final-report/
          retention-days: 90
